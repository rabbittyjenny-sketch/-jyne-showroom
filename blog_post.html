<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - iDEAS365</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --text-dark: #1A1A1A; --accent: #4285F4; }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; font-family: 'Noto Sans Thai', sans-serif; background: #fff; color: var(--text-dark); }
        .nav-header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 20px 40px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
            border-bottom: 1px solid #eee; z-index: 100;
        }
        .logo-img { height: 32px; }
        .nav-btns { display: flex; gap: 10px; }
        .back-btn, .map-btn {
            background: var(--text-dark); color: #fff; text-decoration: none;
            padding: 7px 18px; border-radius: 25px; font-weight: 700; font-size: 13px;
        }
        .back-btn { background: transparent; color: var(--text-dark); border: 2px solid #ddd; }
        .back-btn:hover { border-color: var(--text-dark); }
        .container { max-width: 760px; margin: 0 auto; padding: 100px 20px 80px; }
        .post-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
        .post-cat {
            padding: 4px 14px; border-radius: 20px; font-size: 12px;
            font-weight: 700; text-transform: uppercase; background: var(--accent); color: #fff;
        }
        .post-date { font-size: 0.8rem; color: #999; }
        .post-rt   { font-size: 0.8rem; color: #999; }
        h1.post-title { font-family: 'Anton', 'Noto Sans Thai', sans-serif; font-size: clamp(2.2rem, 6vw, 3.5rem); line-height: 1.1; margin: 0 0 30px; letter-spacing: 1px; text-transform: uppercase; }
        .post-excerpt { font-size: 1.1rem; color: #555; font-weight: 300; line-height: 1.8; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 2px solid #eee; }
        .post-content { font-size: 0.95rem; line-height: 1.85; color: #333; font-weight: 300; }
        .post-content h2, .post-content h3 { font-family: 'Anton', 'Noto Sans Thai', sans-serif; letter-spacing: 0.5px; margin-top: 32px; }
        .post-content ul, .post-content ol { padding-left: 22px; }
        .post-content li { margin-bottom: 8px; }
        .post-content strong { font-weight: 700; color: var(--text-dark); }
        .post-footer { margin-top: 60px; padding-top: 30px; border-top: 1px solid #eee; }
        .post-footer p { font-size: 0.9rem; color: #555; }
        .cta-link { color: var(--accent); font-weight: 700; text-decoration: none; }
        .cta-link:hover { text-decoration: underline; }
        .status-msg { text-align: center; font-size: 1rem; color: #888; padding: 60px 20px; }
        @media (max-width: 768px) { .nav-header { padding: 15px 20px; } }
    </style>
</head>
<body>
    <header class="nav-header">
        <a href="index.html"><img src="https://ik.imagekit.io/ideas365logo/ideas365-logo.png?updatedAt=1771192801056" alt="iDEAS365" class="logo-img"></a>
        <div class="nav-btns">
            <a href="blog.html" class="back-btn">← Blog</a>
            <a href="index.html" class="map-btn" style="background:none;border:none;box-shadow:none;padding:0;"><img src="https://ik.imagekit.io/ideas365logo/back_button.png?updatedAt=1772818424448" alt="Back to Map" style="height:48px;width:auto;display:block;"></a>
        </div>
    </header>
    <main class="container">
        <div id="post-container"><p class="status-msg">กำลังโหลดบทความ…</p></div>
    </main>
    <script>
    const SHEET_ID = '1R8_h1FGyIvalUj77AzBOgx-Ny4w0Xl75qHI1hidiVpE';
    const BLOG_GID = '0';
    const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${BLOG_GID}`;

    function parseCSVLine(line) {
        const result = []; let current = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') { inQuotes = !inQuotes; }
            else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
            else { current += ch; }
        }
        result.push(current.trim());
        return result.map(v => v.replace(/^"|"$/g, ''));
    }

    function parseCSV(csvText) {
        const lines = csvText.split('\n').filter(l => l.trim());
        if (lines.length < 2) return [];
        const headers = parseCSVLine(lines[0]);
        return lines.slice(1).map(line => {
            const vals = parseCSVLine(line);
            const row = {};
            headers.forEach((h, i) => row[h.trim()] = (vals[i] || '').trim());
            return row;
        });
    }

    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name) || '';
    }

    function renderPost(post) {
        const container = document.getElementById('post-container');
        const title    = post.title    || post.Title    || 'บทความ';
        const excerpt  = post.excerpt  || post.Excerpt  || '';
        const date     = post.date     || post.Date     || '';
        const cat      = post.category || post.Category || '';
        const rt       = post.readTime || post.ReadTime || '';
        const content  = post.content  || post.Content  || '';

        document.title = title + ' - iDEAS365';
        container.innerHTML = `
            <div class="post-meta">
                ${cat ? `<span class="post-cat">${cat}</span>` : ''}
                ${date ? `<span class="post-date">${date}</span>` : ''}
                ${rt   ? `<span class="post-rt">${rt}</span>`   : ''}
            </div>
            <h1 class="post-title">${title}</h1>
            ${excerpt ? `<p class="post-excerpt">${excerpt}</p>` : ''}
            ${content ? `<div class="post-content">${content}</div>` : ''}
            <div class="post-footer">
                <p>ชอบบทความนี้ไหม? <a class="cta-link" href="contact_port.html">คุยกันเรื่องธุรกิจ →</a></p>
            </div>
        `;
    }

    async function loadPost() {
        const container = document.getElementById('post-container');
        const postId = getParam('id');
        if (!postId) {
            container.innerHTML = '<p class="status-msg">ไม่พบบทความ <a href="blog.html">← กลับไปหน้า Blog</a></p>';
            return;
        }
        try {
            const res = await fetch(CSV_URL);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const posts = parseCSV(await res.text());
            const post = posts.find(p => (p.id || p.ID || '') === postId);
            if (!post) {
                container.innerHTML = '<p class="status-msg">ไม่พบบทความนี้ <a href="blog.html">← กลับไปหน้า Blog</a></p>';
                return;
            }
            renderPost(post);
        } catch (err) {
            container.innerHTML = '<p class="status-msg">โหลดไม่ได้ <a href="blog.html">← กลับไป Blog</a></p>';
            console.error(err);
        }
    }
    loadPost();
    </script>
</body>
</html>
