<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOG UPDATE - iDEAS365</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-dark: #1A1A1A;
            --blog-blue: #4285F4;
            --blog-yellow: #FBBC05;
            --blog-green: #34A853;
            --blog-red: #EA4335;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: 'Noto Sans Thai', sans-serif; background-color: #ffffff; color: var(--text-dark);
        }
        .nav-header {
            position: absolute; top: 0; left: 0; width: 100%; padding: 25px 40px;
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
        }
        .logo-container { text-decoration: none; display: flex; align-items: center; }
        .logo-img { height: 35px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        .map-btn {
            background: var(--text-dark); color: #ffffff; text-decoration: none;
            padding: 8px 24px; border-radius: 30px; font-weight: 700; font-size: 14px;
            display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .main-content {
            display: flex; flex-direction: column; align-items: center;
            padding: 120px 20px 60px; max-width: 1200px; margin: 0 auto;
        }
        .page-title {
            font-family: 'Anton', 'Noto Sans Thai', sans-serif; font-size: clamp(4rem, 10vw, 7.5rem);
            text-align: center; line-height: 0.9; margin: 0 0 15px 0;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .page-subtitle { font-size: 1.15rem; font-weight: 400; margin: 0 0 50px 0; text-align: center; }
        .status-msg { text-align: center; font-size: 1rem; color: #888; padding: 40px; width: 100%; }
        .blog-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px; width: 100%;
        }
        .blog-card {
            background-color: #ffffff; border: 3px solid; border-radius: 16px; padding: 30px;
            text-align: left; display: flex; flex-direction: column;
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
            text-decoration: none; color: var(--text-dark);
        }
        .blog-card[data-color="blue"]   { border-color: var(--blog-blue);   box-shadow: 6px 6px 0px var(--blog-blue); }
        .blog-card[data-color="yellow"] { border-color: var(--blog-yellow); box-shadow: 6px 6px 0px var(--blog-yellow); }
        .blog-card[data-color="dark"]   { border-color: var(--text-dark);   box-shadow: 6px 6px 0px var(--text-dark); }
        .blog-card[data-color="green"]  { border-color: var(--blog-green);  box-shadow: 6px 6px 0px var(--blog-green); }
        .blog-card[data-color="red"]    { border-color: var(--blog-red);    box-shadow: 6px 6px 0px var(--blog-red); }
        .blog-card:hover { transform: translate(-4px, -4px); }
        .blog-card[data-color="blue"]:hover   { box-shadow: 10px 10px 0px var(--blog-blue); }
        .blog-card[data-color="yellow"]:hover { box-shadow: 10px 10px 0px var(--blog-yellow); }
        .blog-card[data-color="dark"]:hover   { box-shadow: 10px 10px 0px var(--text-dark); }
        .blog-card[data-color="green"]:hover  { box-shadow: 10px 10px 0px var(--blog-green); }
        .blog-card[data-color="red"]:hover    { box-shadow: 10px 10px 0px var(--blog-red); }
        .tag {
            align-self: flex-start; padding: 6px 16px; border-radius: 20px; font-size: 12px;
            font-weight: 700; text-transform: uppercase; margin-bottom: 20px; color: #fff;
        }
        .blog-card[data-color="blue"]   .tag { background: var(--blog-blue); }
        .blog-card[data-color="yellow"] .tag { background: var(--blog-yellow); color: var(--text-dark); }
        .blog-card[data-color="dark"]   .tag { background: var(--text-dark); }
        .blog-card[data-color="green"]  .tag { background: var(--blog-green); }
        .blog-card[data-color="red"]    .tag { background: var(--blog-red); }
        .blog-card h2 {
            font-family: 'Anton', 'Noto Sans Thai', sans-serif; font-size: 1.8rem; margin: 0 0 10px 0;
            letter-spacing: 1px; line-height: 1.2; text-transform: uppercase;
        }
        .blog-card p { font-weight: 300; font-size: 0.92rem; line-height: 1.6; margin: 0 0 12px 0; color: #444; flex-grow: 1; }
        .blog-meta { font-size: 0.72rem; color: #999; font-weight: 300; margin-top: auto; }
        @media (max-width: 768px) { .blog-grid { grid-template-columns: 1fr; } .nav-header { padding: 15px 20px; } }
    </style>
</head>
<body>
    <header class="nav-header">
        <a href="index.html" class="logo-container">
            <img src="https://ik.imagekit.io/ideas365logo/ideas365-logo.png?updatedAt=1771192801056" alt="iDEAS365" class="logo-img">
        </a>
        <a href="index.html" class="map-btn" style="background:none;border:none;box-shadow:none;padding:0;"><img src="https://ik.imagekit.io/ideas365logo/back_button.png?updatedAt=1772818424448" alt="Back to Map" style="height:48px;width:auto;display:block;"></a>
    </header>
    <main class="main-content">
        <h1 class="page-title">BLOG<br>UPDATE</h1>
        <p class="page-subtitle">Thoughts, experiments, and frameworks.</p>
        <div id="blog-container" class="blog-grid">
            <p class="status-msg">กำลังโหลดบทความ…</p>
        </div>
    </main>
    <script>
    // ══════════════════════════════════════════════════════════════
    // 📌 วาง URL ของ Apps Script ที่ deploy แล้วตรงนี้
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8OtwsAK1mZlAbPCrm9TGchP20oEZZqDpJWBSn8LXs39V6XDqOWR6BTfY-3tOQnJ0A/exec';
    // ══════════════════════════════════════════════════════════════
    // Sheet tab ที่ใช้: "blog"
    // Columns: id | slug | title | category | excerpt_thai | excerpt_eng | time | date | image_url | course_url

    const COLOUR_MAP = {
        'social media': 'blue', 'systems': 'green', 'system': 'green',
        'live commerce': 'red', 'ai automation': 'dark', 'ai': 'dark',
        'mindset': 'yellow', 'business': 'blue', 'tech': 'dark', 'marketing': 'yellow',
    };
    function colourFor(cat) { return COLOUR_MAP[(cat||'').toLowerCase()] || 'blue'; }

    function renderPosts(posts) {
        const container = document.getElementById('blog-container');
        if (!posts.length) {
            container.innerHTML = '<p class="status-msg">ยังไม่มีบทความในขณะนี้</p>';
            return;
        }
        container.innerHTML = posts.map(p => {
            const title   = p.title    || '(ไม่มีชื่อ)';
            const excerpt = p.excerpt_thai || p.excerpt_eng || p.excerpt || '';
            const date    = p.date     || '';
            const cat     = p.category || '';
            const rt      = p.time     || p.readTime || '';
            const colour  = colourFor(cat);
            // ลิ้งค์ไปหน้าบทความ (course_url) ถ้าไม่มีให้ใช้ slug
            const href    = p.course_url || (p.slug ? `blog_post.html?slug=${encodeURIComponent(p.slug)}` : '#');
            const isExt   = href.startsWith('http');
            return `
            <a href="${href}" class="blog-card" data-color="${colour}"${isExt ? ' target="_blank" rel="noopener"' : ''}>
                <div class="tag">${cat || 'Blog'}</div>
                <h2>${title.toUpperCase()}</h2>
                ${excerpt ? `<p>${excerpt}</p>` : ''}
                <div class="blog-meta">${date}${rt ? ' · ' + rt : ''} &nbsp;<strong>Read Article →</strong></div>
            </a>`;
        }).join('');
    }

    async function loadBlog() {
        const container = document.getElementById('blog-container');
        if (!APPS_SCRIPT_URL) {
            container.innerHTML = '<p class="status-msg">⚠️ ยังไม่ได้ตั้งค่า APPS_SCRIPT_URL ในไฟล์ blog.html</p>';
            return;
        }
        try {
            const res  = await fetch(APPS_SCRIPT_URL + '?sheet=blog');
            const json = await res.json();
            if (json.success) {
                renderPosts(json.data);
            } else {
                container.innerHTML = `<p class="status-msg">Error: ${json.error}</p>`;
            }
        } catch (err) {
            container.innerHTML = '<p class="status-msg">ไม่สามารถโหลดบทความได้<br><small>ตรวจสอบว่า Apps Script deploy แล้วและ Sheet ตั้งเป็น public</small></p>';
            console.error(err);
        }
    }
    loadBlog();
    </script>
</body>
</html>
