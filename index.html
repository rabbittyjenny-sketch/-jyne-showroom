<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iDEAS365 - The Interactive Archipelago</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-ocean: #6FB3D2;
            --island-shadow: drop-shadow(0 12px 15px rgba(0,0,0,0.35));
            --transition-bounce: all 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-ocean);
            background-image: url('background_mix.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden;
        }
        #view-map {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        .map-wrapper {
            position: relative; width: 100%; max-width: 1400px; height: 100vh; margin: 0 auto;
        }
        .island {
            position: absolute; cursor: pointer; transition: var(--transition-bounce);
            display: flex; flex-direction: column; align-items: center;
            filter: var(--island-shadow); transform-origin: center bottom;
            text-decoration: none;
        }
        @keyframes individualFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1.5deg); }
        }
        /* Positions Locked per Original Staff Request */
        #island-profile { top: 25%; left: 8%; width: 22%; animation: individualFloat 4.2s ease-in-out infinite; }
        #island-work     { top: 8%; left: 40%; width: 22%; animation: individualFloat 3.8s ease-in-out infinite; animation-delay: 0.2s; }
        #island-system   { top: 22%; right: 8%; width: 22%; animation: individualFloat 5.1s ease-in-out infinite; animation-delay: -0.5s; }
        #island-library  { top: 52%; left: 12%; width: 20%; animation: individualFloat 4.7s ease-in-out infinite; animation-delay: 0.8s; }
        #island-blog     { bottom: 5%; left: 42%; width: 24%; animation: individualFloat 5.5s ease-in-out infinite; animation-delay: -1.2s; }
        #island-contact  { bottom: 0; right: 5%; width: 30%; filter: drop-shadow(0 -8px 12px rgba(0,0,0,0.2)); }

        .island:hover { transform: scale(1.15) translateY(-20px) !important; filter: brightness(1.1) drop-shadow(0 25px 30px rgba(255,255,255,0.4)); z-index: 100; }
        .island img { width: 100%; height: auto; display: block; }
        .island-badge {
            position: absolute; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); color: #000; padding: 6px 22px;
            border-radius: 25px; font-size: 14px; font-weight: 700; top: -35px;
            white-space: nowrap; transition: var(--transition-bounce);
        }
        @media (max-width: 768px) {
            #island-profile { top: 5%; left: 5%; width: 42%; }
            #island-work     { top: 20%; right: 5%; width: 45%; }
            #island-contact  { bottom: 0; right: 0; width: 60%; }
        }
    </style>
</head>
<body>
    <div id="view-map">
        <div class="map-wrapper">
            <a href="about_island.html" class="island" id="island-profile"><div class="island-badge">PROFILE</div><img src="https://ik.imagekit.io/ideas365logo/profile.png"></a>
            <a href="work_town.html" class="island" id="island-work"><div class="island-badge">WORKS</div><img src="https://ik.imagekit.io/ideas365logo/work.png"></a>
            <a href="system_district.html" class="island" id="island-system"><div class="island-badge">SYSTEMS</div><img src="https://ik.imagekit.io/ideas365logo/system.png"></a>
            <a href="learning_bay.html" class="island" id="island-library"><div class="island-badge">LIBRARY</div><img src="https://ik.imagekit.io/ideas365logo/library.png"></a>
            <a href="blog.html" class="island" id="island-blog"><div class="island-badge">BLOG</div><img src="https://ik.imagekit.io/ideas365logo/blog.png"></a>
            <a href="contact_port.html" class="island" id="island-contact"><div class="island-badge">CONTACT</div><img src="https://ik.imagekit.io/ideas365logo/contact.png"></a>
        </div>
    </div>
</body>
</html>
