<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iDEAS365 - The Interactive Archipelago</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --island-shadow: drop-shadow(0 12px 15px rgba(0,0,0,0.35));
            --transition-smooth: all 0.4s ease-out;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Noto Sans Thai', sans-serif;
            /* 📸 เปลี่ยน URL background ที่นี่ */
            background-image: url('https://ik.imagekit.io/ideas365logo/background_mix.png?updatedAt=1772818424869');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #6FB3D2;
            overflow: hidden;
        }

        /* LOGO — มุมบนซ้าย */
        .nav-header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 25px 40px;
            display: flex; justify-content: flex-start; align-items: center; z-index: 100;
            pointer-events: none;
        }
        /* 📸 เปลี่ยน URL โลโก้ที่นี่ */
        .logo-img { height: 45px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); pointer-events: auto; }

        #view-map {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        .map-wrapper {
            position: relative; width: 100%; max-width: 1400px; height: 100vh; margin: 0 auto;
        }

        .island {
            position: absolute; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            filter: var(--island-shadow); transform-origin: center bottom;
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        /* แอนิเมชันลอยน้ำ — นุ่มนวล ไม่สั่น */
        @keyframes individualFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50%       { transform: translateY(-8px) rotate(0.4deg); }
        }

        /* 🏝️ ตำแหน่งเกาะ — ปรับเลข % ตรงนี้ถ้าต้องการย้าย */
        #island-system  { top: 21%; left: 42%; width: 17%; animation: individualFloat 7s ease-in-out infinite; }
        #island-profile { top: 28%; left: 17%; width: 21%; animation: individualFloat 8s ease-in-out infinite; }
        #island-work    { top: 26%; right: 14%; width: 20%; animation: individualFloat 9s ease-in-out infinite; animation-delay: -0.5s; }
        #island-library { top: 58%; left: 14%; width: 18%; animation: individualFloat 7.5s ease-in-out infinite; animation-delay: 0.8s; }
        #island-blog    { bottom: 8%; left: 42%; width: 21%; animation: individualFloat 8.5s ease-in-out infinite; animation-delay: -1.2s; }
        #island-contact { bottom: 0; right: 3%; width: 30%; animation: none; filter: drop-shadow(0 -8px 12px rgba(0,0,0,0.2)); }


        /* Hover — ใช้ scale แยกออกจาก transform เพื่อไม่ตีกับ float animation */
        .island:hover {
            scale: 1.05;
            margin-top: -8px;
            filter: brightness(1.1) drop-shadow(0 20px 25px rgba(255,255,255,0.35));
            z-index: 100;
        }

        .island img { width: 100%; height: auto; display: block; }

        /* Badge — อยู่ภายในวงกลมเกาะ */
        .island-badge {
            position: absolute; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #000; padding: 6px 22px;
            border-radius: 25px; font-size: 14px; font-weight: 700; top: 10px;
            white-space: nowrap; transition: var(--transition-smooth); z-index: 10;
        }
        
        /* 💬 ระบบ Pop-up แบบ "Cute POP" (เด้งดึ๋ง สไตล์การ์ตูน โผล่ด้านบน) */
        .island::after {
            content: attr(data-tooltip); 
            position: absolute;
            top: -20px; left: 50%; /* เริ่มต้นซ่อนอยู่หลังป้ายชื่อเกาะ */
            transform: translateX(-50%) scale(0.3); 
            transform-origin: bottom center; /* จุดศูนย์ถ่วงอยู่ด้านล่าง ให้พุ่งขึ้นบน */
            background: #ffffff; /* สีพื้นหลังลูกโป่ง */
            color: #000;
            padding: 8px 18px; border-radius: 30px; 
            font-size: 14px; font-weight: 700;
            white-space: nowrap; pointer-events: none;
            opacity: 0; visibility: hidden; 
            /* 🎀 สูตรลับความเด้งดึ๋ง (Bouncy Physics) */
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 200; 
            /* สไตล์ Pop Art: ขอบดำหนา + เงาแข็ง */
            border: 2px solid #000;
            box-shadow: 0 4px 0 #000;
        }
            .island:hover::after {
            opacity: 1; visibility: visible;
            top: -85px; /* เด้งทะลุขึ้นไปเหนือป้ายชื่อเกาะ */
            transform: translateX(-50%) scale(1);
        }
        
            /* 📱 2. จอมือถือ (Mobile) - เรียงซิกแซกครบ 6 เกาะ ป้องกันการทับซ้อน */
            @media (max-width: 768px) {
            .nav-header { padding: 15px 20px; }
            .logo-img { height: 35px; } 

            /* ซ้าย-ขวา สลับกัน */
            #island-profile { top: 12%; left: 5%; width: 30%; right: auto; }
            #island-work    { top: 22%; right: 5%; left: auto; width: 32%; }
            #island-library { top: 40%; left: 5%; width: 28%; right: auto; }
            #island-system  { top: 52%; right: 5%; left: auto; width: 30%; } 
            #island-blog    { bottom: 15%; left: 10%; width: 32%; right: auto; }
            #island-contact { bottom: 0; right: 0; left: auto; width: 45%; }
            
            /* ย่อขนาดป้ายชื่อบนมือถือลงนิดนึง */
            .island-badge { font-size: 12px; padding: 4px 16px; top: -25px; }
        }

    </style>
</head>
<body>
    <!-- โลโก้มุมบนซ้าย -->
    <header class="nav-header">
        <!-- 📸 เปลี่ยน URL โลโก้ที่นี่ -->
        <img src="https://ik.imagekit.io/ideas365logo/LOGO_iDEAS365Black.png?updatedAt=1772818424343" alt="iDEAS365" class="logo-img">
    </header>

    <div id="view-map">
        <div class="map-wrapper">
            <a href="about_island.html"    class="island" id="island-profile" data-tooltip="เกี่ยวกับ-JYNE"><div class="island-badge">ABOUT ISLAND</div><img src="https://ik.imagekit.io/ideas365logo/profile.png"></a>
            <a href="work_town.html"       class="island" id="island-work"  data-tooltip="ทำอะไรมาบ้าง?" ><div class="island-badge">WORKS WAREHOUSE</div><img src="https://ik.imagekit.io/ideas365logo/work.png"></a>
            <a href="system_district.html" class="island" id="island-system" data-tooltip="ความสำเร็จอยู่ในหลักสูตร" ><div class="island-badge">ACADEME BAY</div><img src="https://ik.imagekit.io/ideas365logo/system.png"></a>
            <a href="learning_bay.html"    class="island" id="island-library" data-tooltip="รวมไอเดียความรู้" ><div class="island-badge">LEARNING BRIDGE</div><img src="https://ik.imagekit.io/ideas365logo/library.png"></a>
            <a href="blog.html"            class="island" id="island-blog" data-tooltip="365Blog"  ><div class="island-badge">BLOG HARBOR</div><img src="https://ik.imagekit.io/ideas365logo/blog.png"></a>
            <a href="contact_port.html"    class="island" id="island-contact"  data-tooltip="ติดต่อที่นี่"><div class="island-badge">CONTACT PIER</div><img src="https://ik.imagekit.io/ideas365logo/contact.png"></a>
        </div>
    </div>
</body>
</html>
